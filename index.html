<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WeGrowTech</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:#fff;
}

/* NAVBAR */
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
}

nav img {
    height:60px;
}

/* HERO */
.hero {
    padding:70px 40px;
    background:linear-gradient(135deg,#0a66c2,#00c6ff);
    text-align:center;
}

.hero h1 {
    font-size:42px;
    margin-bottom:10px;
}

.hero p {
    color:#e2e8f0;
}

.btn {
    margin-top:20px;
    padding:12px 25px;
    background:#000;
    color:#fff;
    border-radius:25px;
    text-decoration:none;
}

/* SECTION */
.section {
    padding:50px 40px;
    text-align:center;
}

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1e293b;
    margin:15px;
    padding:25px;
    width:260px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-6px);
    background:#334155;
}

/* FOOTER */
footer {
    background:#020617;
    padding:20px;
    text-align:center;
    color:#aaa;
}
</style>
</head>

<body>

<nav>
    <img src="logo.png">
</nav>

<div class="hero">
    <h1>WeGrowTech 🚀</h1>
    <p>Professional IT Support & AMC Services</p>
    <a class="btn" href="#">Get Started</a>
</div>

<div class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">Desktop Support</div>
<div class="card">AMC Management</div>
<div class="card">Network Setup</div>
<div class="card">Microsoft 365</div>
</div>
</div>

<div class="section">
<h2>AMC Plans</h2>
<div class="cards">
<div class="card">Basic</div>
<div class="card">Standard</div>
<div class="card">Premium</div>
</div>
</div>

<footer>
© 2026 WeGrowTech
</footer>

</body>
</html>
